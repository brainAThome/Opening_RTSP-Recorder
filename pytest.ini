# pytest-Konfiguration für die HA-Custom-Component `rtsp_recorder`.
#
# pythonpath: Die Tests importieren die Integrationsmodule direkt als Top-Level
#   (z.B. `import camera_settings`, `from analysis import ...`). Ohne diesen Eintrag
#   scheitert die Collection mit ModuleNotFoundError, sobald pytest OHNE manuell
#   gesetztes PYTHONPATH läuft (wie es die CI tut). Deklarativ statt env-Variable,
#   damit lokale Läufe und CI identisch grün sind.
[pytest]
pythonpath = custom_components/rtsp_recorder
testpaths = tests
